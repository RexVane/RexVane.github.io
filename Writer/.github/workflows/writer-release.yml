name: Writer Release

on:
  push:
    tags:
      - 'writer-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            args: --win portable
          - os: macos-latest
            args: --mac
    runs-on: ${{ matrix.os }}
    env:
      # 没有 Apple 开发者证书，跳过 macOS 代码签名。
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    defaults:
      run:
        working-directory: Writer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Writer/package-lock.json
      - run: npm ci || npm install --no-audit --no-fund
      - run: npm test
      - run: npm run generate:icon
      - run: npm run build:renderer
      - run: npx electron-builder ${{ matrix.args }} --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: writer-${{ matrix.os }}
          path: |
            Writer/release/*.exe
            Writer/release/*.dmg
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/writer-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          name: RexVane Writer ${{ github.ref_name }}
          files: dist/*
          body: |
            **Blog Writer** —— 本地写文章、一键上传到博客的桌面程序。

            在本地编辑 Markdown、实时预览，一键提交到博客仓库的独立分支，在 GitHub 合并 PR 后文章正式发布。程序自动识别你自己博客仓库的 GitHub 地址，不绑定任何固定账号，配置方法见仓库 `Writer/README.md`。

            ## 下载
            - **Windows**：`Blog-Writer-*-x64.exe`（便携版，双击即用）
            - **macOS（Apple Silicon）**：`Blog-Writer-*-arm64.dmg`
            - **macOS（Intel）**：`Blog-Writer-*-x64.dmg`

            ## macOS 首次打开
            应用未经 Apple 公证，首次打开请在应用上**右键 → 打开**；如果提示“已损坏”，在终端执行：
            ```
            xattr -cr "/Applications/Blog Writer.app"
            ```

            ## 使用前提
            本地安装 git 并配置好推送权限；博客为 Astro 内容集合结构（`src/content/blog/<语言>/*.md`）；博客工作副本放在用户主目录下的 `*.github.io` 文件夹，或在配置文件中指定路径。
