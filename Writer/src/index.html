<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file: writer-img:; connect-src 'self' ws://127.0.0.1:* http://127.0.0.1:*"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RexVane Writer</title>
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <aside class="library-panel">
        <header class="brand-row">
          <div class="brand-mark" aria-hidden="true"><i data-lucide="pen-line"></i></div>
          <div>
            <strong>RexVane Writer</strong>
            <span>rexvane.github.io</span>
          </div>
        </header>

        <button class="new-article-button" id="new-article-button" type="button">
          <i data-lucide="file-plus-2"></i>
          <span>新建文章</span>
        </button>

        <label class="search-field" for="article-search">
          <i data-lucide="search"></i>
          <input id="article-search" type="search" placeholder="搜索文章" autocomplete="off" />
        </label>

        <div class="library-heading">
          <span>文章</span>
          <output id="article-count">0</output>
        </div>
        <nav class="article-list" id="article-list" aria-label="文章列表"></nav>

        <footer class="repo-footer">
          <div class="repo-state">
            <span class="status-dot" id="repo-status-dot"></span>
            <div>
              <strong id="repo-branch">main</strong>
              <span id="repo-state-text">正在读取仓库</span>
            </div>
          </div>
          <button class="icon-button dark" id="sync-main-button" type="button" title="同步 main" aria-label="同步 main">
            <i data-lucide="refresh-cw"></i>
          </button>
        </footer>
      </aside>

      <main class="workspace">
        <header class="workspace-toolbar">
          <div class="document-identity">
            <span class="document-kicker" id="document-kicker">新文章</span>
            <strong id="document-name">未命名文章</strong>
            <span class="save-indicator" id="save-indicator">未保存</span>
          </div>
          <div class="toolbar-actions">
            <button class="command-button danger" id="delete-button" type="button" hidden>
              <i data-lucide="trash-2"></i>
              <span>删除文章</span>
            </button>
            <button class="command-button secondary" id="save-button" type="button">
              <i data-lucide="save"></i>
              <span>保存</span>
            </button>
            <button class="command-button primary" id="publish-button" type="button">
              <i data-lucide="send"></i>
              <span>提交到分支</span>
            </button>
          </div>
        </header>

        <div class="editing-layout">
          <aside class="metadata-panel" aria-label="文章设置">
            <div class="panel-heading">
              <div>
                <span>ARTICLE DATA</span>
                <h2>文章信息</h2>
              </div>
              <i data-lucide="sliders-horizontal"></i>
            </div>

            <div class="field-group">
              <span class="field-label">语言</span>
              <div class="segmented-control" id="language-control">
                <button class="active" type="button" data-language="zh">中文</button>
                <button type="button" data-language="en">English</button>
              </div>
            </div>

            <label class="field-group" for="title-input">
              <span class="field-label">标题</span>
              <input id="title-input" type="text" maxlength="120" placeholder="输入文章标题" />
            </label>

            <label class="field-group" for="slug-input">
              <span class="field-label-row">
                <span class="field-label">链接</span>
                <span class="field-hint">/blog/<b id="slug-preview">post</b>/</span>
              </span>
              <input id="slug-input" type="text" maxlength="80" placeholder="article-slug" spellcheck="false" />
            </label>

            <label class="field-group" for="description-input">
              <span class="field-label-row">
                <span class="field-label">摘要</span>
                <span class="field-hint"><b id="description-count">0</b>/240</span>
              </span>
              <textarea id="description-input" rows="3" maxlength="240" placeholder="列表与搜索结果中显示的摘要"></textarea>
            </label>

            <div class="field-row">
              <label class="field-group" for="category-select">
                <span class="field-label">主分类</span>
                <select id="category-select">
                  <option value="Blog">Blog</option>
                  <option value="Project">Project</option>
                  <option value="Daily Life">Daily Life</option>
                  <option value="Journal">Journal</option>
                </select>
              </label>
              <label class="field-group" for="subcategory-select">
                <span class="field-label">子分类</span>
                <select id="subcategory-select">
                  <option value="Technology">Technology</option>
                  <option value="AI">AI</option>
                  <option value="Insight">Insight</option>
                </select>
              </label>
            </div>

            <div class="field-group tag-field" id="tag-field">
              <span class="field-label">标签</span>
              <button class="dropdown-trigger" id="tag-dropdown-button" type="button" aria-expanded="false">
                <span id="tag-trigger-text">选择标签</span>
                <i data-lucide="chevron-down"></i>
              </button>
              <div class="selected-tags" id="selected-tags"></div>
              <div class="tag-dropdown" id="tag-dropdown" hidden>
                <label class="tag-search" for="tag-search-input">
                  <i data-lucide="search"></i>
                  <input id="tag-search-input" type="text" placeholder="搜索或输入新标签" maxlength="30" />
                </label>
                <div class="tag-options" id="tag-options"></div>
                <button class="add-tag-button" id="add-tag-button" type="button" hidden>
                  <i data-lucide="plus"></i>
                  <span id="add-tag-label"></span>
                </button>
              </div>
            </div>

            <label class="field-group" for="pub-date-input">
              <span class="field-label-row">
                <span class="field-label">发布时间</span>
                <span class="field-hint">提交时自动获取</span>
              </span>
              <input id="pub-date-input" type="datetime-local" step="60" readonly />
            </label>

            <div class="field-group">
              <span class="field-label">封面</span>
              <div class="cover-control">
                <input id="hero-image-input" type="text" placeholder="/images/posts/..." spellcheck="false" />
                <button class="icon-button" id="choose-cover-button" type="button" title="选择封面" aria-label="选择封面">
                  <i data-lucide="image-plus"></i>
                </button>
              </div>
            </div>

            <label class="toggle-row" for="draft-input">
              <span>
                <strong>保存为草稿</strong>
                <small>草稿不能提交发布分支</small>
              </span>
              <input id="draft-input" type="checkbox" />
              <span class="toggle" aria-hidden="true"></span>
            </label>
          </aside>

          <section class="editor-panel">
            <header class="editor-header">
              <div class="view-switcher" id="view-switcher">
                <button type="button" data-view="write"><i data-lucide="pencil-line"></i><span>写作</span></button>
                <button type="button" data-view="split" class="active"><i data-lucide="columns-2"></i><span>分栏</span></button>
                <button type="button" data-view="preview"><i data-lucide="eye"></i><span>预览</span></button>
              </div>
              <div class="document-stats">
                <span><b id="word-count">0</b> 字</span>
                <span><b id="read-time">1</b> 分钟阅读</span>
              </div>
            </header>

            <div class="markdown-toolbar" id="markdown-toolbar" role="toolbar" aria-label="Markdown 格式">
              <button type="button" data-command="bold" title="粗体" aria-label="粗体"><i data-lucide="bold"></i></button>
              <button type="button" data-command="italic" title="斜体" aria-label="斜体"><i data-lucide="italic"></i></button>
              <span class="toolbar-separator"></span>
              <button type="button" data-command="heading" title="二级标题" aria-label="二级标题"><i data-lucide="heading-2"></i></button>
              <button type="button" data-command="quote" title="引用" aria-label="引用"><i data-lucide="quote"></i></button>
              <button type="button" data-command="code" title="代码" aria-label="代码"><i data-lucide="code-2"></i></button>
              <span class="toolbar-separator"></span>
              <button type="button" data-command="link" title="链接" aria-label="链接"><i data-lucide="link"></i></button>
              <button type="button" data-command="list" title="无序列表" aria-label="无序列表"><i data-lucide="list"></i></button>
              <button type="button" data-command="ordered-list" title="有序列表" aria-label="有序列表"><i data-lucide="list-ordered"></i></button>
            </div>

            <div class="editor-stage split" id="editor-stage">
              <div class="write-pane">
                <textarea id="body-input" spellcheck="true" placeholder="从这里开始写正文…"></textarea>
              </div>
              <article class="preview-pane" id="preview-pane">
                <header class="preview-header">
                  <span id="preview-category">Technology</span>
                  <time id="preview-date"></time>
                  <h1 id="preview-title">未命名文章</h1>
                  <p id="preview-description">文章摘要会显示在这里。</p>
                  <div class="preview-tags" id="preview-tags"></div>
                  <figure class="preview-hero" id="preview-hero" hidden>
                    <img alt="文章封面" />
                  </figure>
                </header>
                <div class="preview-prose" id="preview-content"></div>
              </article>
            </div>
          </section>
        </div>
      </main>
    </div>

    <div class="modal-backdrop" id="confirm-modal" hidden>
      <section class="modal confirm-modal" role="alertdialog" aria-modal="true" aria-labelledby="confirm-modal-title">
        <header class="modal-header">
          <div class="modal-icon warning"><i data-lucide="alert-triangle"></i></div>
          <div>
            <span>CONFIRM</span>
            <h2 id="confirm-modal-title">放弃未保存改动？</h2>
          </div>
          <button class="icon-button" data-close-modal="confirm-modal" type="button" aria-label="关闭"><i data-lucide="x"></i></button>
        </header>
        <div class="modal-body">
          <p class="confirm-message" id="confirm-message"></p>
        </div>
        <footer class="modal-footer">
          <button class="command-button secondary" data-close-modal="confirm-modal" type="button">继续编辑</button>
          <button class="command-button primary" id="confirm-accept-button" type="button">
            <i data-lucide="alert-triangle"></i>
            <span>放弃改动</span>
          </button>
        </footer>
      </section>
    </div>

    <div class="modal-backdrop" id="publish-modal" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="publish-modal-title">
        <header class="modal-header">
          <div class="modal-icon"><i data-lucide="git-pull-request"></i></div>
          <div>
            <span>PUBLISH BRANCH</span>
            <h2 id="publish-modal-title">提交文章分支</h2>
          </div>
          <button class="icon-button" data-close-modal="publish-modal" type="button" aria-label="关闭"><i data-lucide="x"></i></button>
        </header>
        <div class="modal-body">
          <div class="branch-flow">
            <span>main</span>
            <i data-lucide="arrow-right"></i>
            <strong id="branch-preview">post/article</strong>
          </div>
          <label class="field-group" for="commit-message-input">
            <span class="field-label">提交说明</span>
            <input id="commit-message-input" type="text" maxlength="120" />
          </label>
          <div class="publish-checks">
            <div><i data-lucide="check"></i><span>仅提交当前文章和封面</span></div>
            <div><i data-lucide="check"></i><span>推送到独立 post 分支</span></div>
            <div><i data-lucide="check"></i><span>由你在 GitHub 合并到 main</span></div>
          </div>
        </div>
        <footer class="modal-footer">
          <button class="command-button secondary" data-close-modal="publish-modal" type="button">取消</button>
          <button class="command-button primary" id="confirm-publish-button" type="button">
            <i data-lucide="git-commit-horizontal"></i>
            <span>提交并推送</span>
          </button>
        </footer>
      </section>
    </div>

    <div class="modal-backdrop" id="success-modal" hidden>
      <section class="modal success-modal" role="dialog" aria-modal="true" aria-labelledby="success-modal-title">
        <div class="success-symbol"><i data-lucide="circle-check-big"></i></div>
        <span>BRANCH READY</span>
        <h2 id="success-modal-title">文章分支已推送</h2>
        <div class="success-details">
          <div><span>分支</span><strong id="success-branch"></strong></div>
          <div><span>提交</span><strong id="success-commit"></strong></div>
        </div>
        <div class="success-actions">
          <button class="command-button secondary" data-close-modal="success-modal" type="button">稍后处理</button>
          <button class="command-button primary" id="open-pr-button" type="button">
            <i data-lucide="external-link"></i>
            <span>打开 GitHub 合并页面</span>
          </button>
        </div>
      </section>
    </div>

    <div class="toast-region" id="toast-region" aria-live="polite"></div>
    <div class="loading-overlay" id="loading-overlay">
      <i data-lucide="loader-circle"></i>
      <span id="loading-text">正在连接博客仓库</span>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
